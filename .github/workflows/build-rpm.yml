name: Build Msty Studio RPM

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version of Msty Studio (e.g., 2.6.4)'
        required: false
      deb_url:
        description: 'Direct download URL for the .deb'
        required: false

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      deb_url: ${{ steps.check.outputs.deb_url }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check latest version
        id: check
        run: |
          # Try to find the latest version from the website
          # For Msty, the version is currently 2.6.4
          VERSION_REMOTE="2.6.4"
          
          # Since the automated scraping is failing, we use the hardcoded current version
          # but allow manual overrides to fix URLs
          LATEST_DEB_URL="https://assets.msty.app/prod/latest/linux/amd64/Msty_amd64_amd64.deb"
          
          VERSION_LOCAL=$(cat version.txt)
          
          if [ "$VERSION_REMOTE" != "$VERSION_LOCAL" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "new_version=${VERSION_REMOTE}" >> $GITHUB_OUTPUT
            echo "deb_url=${LATEST_DEB_URL}" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
            
            if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
              if [ -n "${{ github.event.inputs.version }}" ]; then
                echo "new_version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
              fi
              if [ -n "${{ github.event.inputs.deb_url }}" ]; then
                echo "deb_url=${{ github.event.inputs.deb_url }}" >> $GITHUB_OUTPUT
              fi
            fi
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y ruby-devel gcc make rpm-build rubygems binutils wget git
          gem install --no-document fpm

      - name: Download DEB package
        run: |
          mkdir -p workspace/msty_source
          # Use a browser-like user agent to avoid being blocked
          wget -q -U "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" "${{ needs.check-version.outputs.deb_url }}" -O workspace/msty.deb
          cd workspace/msty_source
          ar x ../msty.deb
          tar -xf data.tar.xz

      - name: Create Post-Install Script
        run: |
          cat << 'EOF' > workspace/postinst.sh
          #!/bin/bash
          ln -sf /opt/MstyStudio/MstyStudio /usr/bin/MstyStudio
          update-desktop-database /usr/share/applications &> /dev/null || :
          update-mime-database /usr/share/mime &> /dev/null || :
          if ! { [[ -L /proc/self/ns/user ]] && unshare --user true; }; then
              chmod 4755 '/opt/MstyStudio/chrome-sandbox' || true
          else
              chmod 0755 '/opt/MstyStudio/chrome-sandbox' || true
          fi
          EOF
          chmod +x workspace/postinst.sh

      - name: Create AppStream Metadata and Desktop File
        run: |
          mkdir -p workspace/msty_source/usr/share/metainfo
          cat << 'EOF' > workspace/msty_source/usr/share/metainfo/ai.msty.mstystudio.metainfo.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <component type="desktop-application">
            <id>ai.msty.mstystudio</id>
            <metadata_license>CC0-1.0</metadata_license>
            <project_license>Proprietary</project_license>
            <name>Msty Studio</name>
            <developer_name>Msty AI</developer_name>
            <summary>Privacy-first, all-in-one AI studio for advanced workflows</summary>
            <description>
              <p>Msty is an all-in-one AI studio designed for privacy, flexibility, and advanced workflows. It allows you to seamlessly switch between local models and top online providers within the same chat.</p>
              <ul>
                <li>Privacy First: Zero telemetry and local storage for all chats and models.</li>
                <li>Hybrid Architecture: Run local models (Ollama/MLX) or connect to Azure, AWS Bedrock, and more.</li>
                <li>Advanced Tools: Integrated Web Search, RAG (Knowledge Stacks), and MCP tool support.</li>
                <li>Studios: Dedicated interfaces for Personas, Prompts, and Workflow automation.</li>
              </ul>
            </description>
            <launchable type="desktop-id">ai.msty.mstystudio.desktop</launchable>
            <url type="homepage">https://msty.ai/</url>
            <url type="bugtracker">https://msty.ai/contact</url>
            <url type="help">https://docs.msty.ai/</url>
            <screenshots>
              <screenshot type="default">
                <caption>The main Msty Studio interface showing a chat with a hybrid model.</caption>
                <image>https://msty.ai/assets/images/hero-image.png</image>
              </screenshot>
            </screenshots>
            <content_rating type="oars-1.1" />
            <releases>
              <release version="${{ needs.check-version.outputs.new_version }}" date="$(date +%Y-%m-%d)" />
            </releases>
            <provides>
              <binary>MstyStudio</binary>
            </provides>
            <categories>
              <category>Utility</category>
              <category>Development</category>
              <category>ArtificialIntelligence</category>
            </categories>
          </component>
          EOF

          rm -f workspace/msty_source/usr/share/applications/MstyStudio.desktop
          mkdir -p workspace/msty_source/usr/share/applications
          cat << 'EOF' > workspace/msty_source/usr/share/applications/ai.msty.mstystudio.desktop
          [Desktop Entry]
          Name=Msty Studio
          Exec=/opt/MstyStudio/MstyStudio %U
          Terminal=false
          Type=Application
          Icon=MstyStudio
          StartupWMClass=MstyStudio
          Comment=Privacy-first AI studio
          Categories=Utility;Development;
          MimeType=x-scheme-handler/msty;
          EOF

      - name: Build RPM with FPM
        run: |
          cd workspace/msty_source
          fpm -s dir -t rpm \
            --name mstystudio \
            --version "${{ needs.check-version.outputs.new_version }}" \
            --architecture x86_64 \
            --vendor "Msty AI" \
            --url "https://msty.ai" \
            --description "Msty is a powerful, locally-focused AI studio that allows you to interact with various models, manage your local AI environment, and utilize specialized skills for a seamless AI experience." \
            --rpm-summary "Privacy-first, all-in-one AI studio for advanced workflows" \
            --depends gtk3 \
            --depends libnotify \
            --depends nss \
            --depends libXScrnSaver \
            --depends libXtst \
            --depends xdg-utils \
            --depends at-spi2-core \
            --depends libuuid \
            --depends libsecret \
            --after-install ../postinst.sh \
            --package ../mstystudio-${{ needs.check-version.outputs.new_version }}-1.x86_64.rpm \
            --force \
            .

      - name: Update version tracking
        if: github.event_name == 'schedule'
        run: |
          git config --global --add safe.directory /__w/msty-studio-rpm/msty-studio-rpm
          git config user.email "jeryd@msty.ai"
          git config user.name "Msty Bot"
          echo "${{ needs.check-version.outputs.new_version }}" > version.txt
          git add version.txt
          git commit -m "Bump version to ${{ needs.check-version.outputs.new_version }}"
          git push

      - name: Upload RPM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mstystudio-rpm-${{ needs.check-version.outputs.new_version }}
          path: workspace/*.rpm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.new_version }}
          name: Msty Studio v${{ needs.check-version.outputs.new_version }}
          files: workspace/*.rpm
          body: |
            Automated RPM build for Msty Studio v${{ needs.check-version.outputs.new_version }}.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Repo Directory
        run: |
          mkdir -p deploy/x86_64
          cp workspace/*.rpm deploy/x86_64/

      - name: Generate Repository Metadata
        run: |
          dnf install -y createrepo_c
          createrepo_c deploy/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
          publish_branch: gh-pages
